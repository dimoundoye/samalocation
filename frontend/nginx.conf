server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Compression Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;

    # Assets statiques Vite (hash dans le nom = cache long)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker : ne jamais mettre en cache pour qu'il se mette à jour
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Manifeste et workbox : idem
    location ~* (workbox|manifest)\.(js|json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback : toute autre requête qui ne correspond pas à un fichier
    # physique renvoie index.html — indispensable pour React Router
    location / {
        try_files $uri $uri/ /index.html =404;

        # En-têtes de sécurité globaux (Correction ZAP)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://stats.samalocation.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://*.tile.openstreetmap.org; img-src 'self' data: blob: https://res.cloudinary.com https://*.tile.openstreetmap.org https://unpkg.com *; connect-src 'self' https://res.cloudinary.com https://nominatim.openstreetmap.org https://api.samalocation.com wss://api.samalocation.com; font-src 'self' https://fonts.gstatic.com data:; frame-ancestors 'none'; upgrade-insecure-requests;" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Empêcher le navigateur de mettre index.html en cache
        # pour que les mises à jour SPA soient toujours récupérées
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            expires 0;
        }
    }
}
