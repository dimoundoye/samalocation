[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://*.tile.openstreetmap.org; img-src 'self' data: blob: https://res.cloudinary.com https://*.tile.openstreetmap.org; connect-src 'self' https://res.cloudinary.com https://samalocation.onrender.com https://nominatim.openstreetmap.org; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://challenges.cloudflare.com;"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
