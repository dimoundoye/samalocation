services:
  db:
    image: postgres:16-alpine
    container_name: samalocation-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-password}
      POSTGRES_DB: ${DB_NAME:-samalocation}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - samalocation-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samalocation-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db
    networks:
      - samalocation-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api.samalocation.com/api
    container_name: samalocation-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - samalocation-network

networks:
  samalocation-network:
    driver: bridge

volumes:
  postgres_data:
