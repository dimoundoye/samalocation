  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: samalocation-supabase-backup
    restart: always
    volumes:
      - ./backups:/backups
    environment:
      - POSTGRES_HOST=aws-1-eu-west-1.pooler.supabase.com
      - POSTGRES_PORT=6543
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres.oleotkybcuvndaoevvrj
      - POSTGRES_PASSWORD=n9Zh6cSHscySTlDG
      - PGSSLMODE=require
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_SUFFIX=.sql
      - POSTGRES_EXTRA_OPTS=--no-owner --no-privileges
      - BACKUP_ON_START=TRUE
    networks:
      - samalocation-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samalocation-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - samalocation-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api.samalocation.com/api
    container_name: samalocation-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - samalocation-network

networks:
  samalocation-network:
    driver: bridge

volumes:
  postgres_data:
